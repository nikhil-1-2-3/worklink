apiVersion: apps/v1
kind: Deployment

metadata:
  name: worklink-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: worklink-backend

  template:
    metadata:
      labels:
        app: worklink-backend

    spec:
      containers:
      - name: backend
        image: singhnikhil212/worklink-backend:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000
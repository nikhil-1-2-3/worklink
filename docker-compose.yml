version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: worklink-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: worklink-backend
    ports:
      # The frontend expects the API at localhost:5005
      - "5005:5000"
    environment:
      - PORT=5000
      # Use local mongodb for development testing
      - MONGODB_URI=mongodb://mongodb:27017/worklink
      - JWT_SECRET=worklink_secure_jwt_secret_2026
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: worklink-frontend
    ports:
      # Map host port 3000 to container port 80 (Nginx)
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
